name: CI-Build

on:
  push:
    branches:
      - master
      - "**"
  pull_request:
    branches:
      - master

jobs:
  build:
    name: Build
    runs-on: ubuntu-22.04
    outputs:
      version_number: ${{ steps.version_number.outputs.version_number }}
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Go 1.26
        uses: actions/setup-go@v4
        with:
          go-version: "1.26.1"
        id: go

      - name: Version Number
        id: version_number
        run: echo "version_number=$(make version_number)" >> $GITHUB_OUTPUT

      - name: Show Version
        run: echo "Version ${{ steps.version_number.outputs.version_number }}"

      - name: Build
        run: make prepare build archive

      - name: "Upload binary archive"
        uses: actions/upload-artifact@v4
        with:
          name: hamlibplugin-archive
          path: ./com.thecodingflow.hamlibplugin.zip
