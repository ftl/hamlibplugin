<!doctype html>
<html lang="en">
    <head>
        <script>
            let update = () => {};
            let vfoSetting = "";
            let antennaSetting = "";
            let optionSetting = "";

            function connectOpenActionSocket(
                inPort,
                inPropertyInspectorUUID,
                inRegisterEvent,
                inInfo,
                inActionInfo,
            ) {
                const websocket = new WebSocket("ws://localhost:" + inPort);
                inActionInfo = JSON.parse(inActionInfo);
                websocket.onopen = () => {
                    websocket.send(
                        JSON.stringify({
                            event: inRegisterEvent,
                            uuid: inPropertyInspectorUUID,
                        }),
                    );
                };

                vfoSetting = inActionInfo.payload.settings.vfo ?? "";
                antennaSetting = inActionInfo.payload.settings.antenna ?? "";
                optionSetting = inActionInfo.payload.settings.option ?? "";

                websocket.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    if (data.event == "didReceiveSettings") {
                        vfoSetting = data.payload.settings.vfo ?? "";
                        antennaSetting = data.payload.settings.antenna ?? "";
                        optionSetting = data.payload.settings.option ?? "";
                    }
                    if (data.event == "sendToPropertyInspector") {
                        // TODO: receive available vfos from the plugin
                    }
                };

                const vfoElement = document.getElementById("vfo");
                vfoElement.value = inActionInfo.payload.settings.vfo ?? "";

                const antennaElement = document.getElementById("antenna");
                antennaElement.value = inActionInfo.payload.settings.antenna ?? "";

                const optionElement = document.getElementById("option");
                optionElement.value = inActionInfo.payload.settings.option ?? "";

                update = () => {
                    websocket.send(
                        JSON.stringify({
                            event: "setSettings",
                            context: inActionInfo.context,
                            payload: {
                                vfo: vfoElement.value || "",
                                antenna: antennaElement.value || "",
                                option: optionElement.value || "",
                            },
                        }),
                    );
                };
            }

            const connectElgatoStreamDeckSocket = connectOpenActionSocket;
        </script>

        <style>
            * {
                font-family: system-ui, sans-serif;
                font-size: 16px;
                color: oklch(92.2% 0 0);
            }
            body {
                margin: 16px;
                background-color: oklch(26.9% 0 0);
            }
            label {
                margin-right: 4px;
            }
            input {
                margin: 4px;
                padding: 4px;
                background-color: oklch(37.1% 0 0);
                border: 1px solid oklch(43.9% 0 0);
                border-radius: 8px;
            }
        </style>
    </head>

    <body>
        <div>
            <label for="vfo">VFO:</label>
            <!-- should be a combo box with all VFOs -->
            <input id="vfo" oninput="update()" type="text" />
            <br />
            <label for="antenna">Antenna:</label>
            <input id="antenna" oninput="update()" type="text" />
            <br />
            <label for="option">Option:</label>
            <input id="option" oninput="update()" type="text" />
        </div>
    </body>
</html>
