<!doctype html>
<html lang="en">
    <head>
        <script>
            let update = () => {};
            let parameterSetting = "";
            let valueSetting = "";

            function connectOpenActionSocket(
                inPort,
                inPropertyInspectorUUID,
                inRegisterEvent,
                inInfo,
                inActionInfo,
            ) {
                const websocket = new WebSocket("ws://localhost:" + inPort);
                inActionInfo = JSON.parse(inActionInfo);
                websocket.onopen = () => {
                    websocket.send(
                        JSON.stringify({
                            event: inRegisterEvent,
                            uuid: inPropertyInspectorUUID,
                        }),
                    );
                };

                parameterSetting = inActionInfo.payload.settings.parameter ?? "";
                valueSetting = inActionInfo.payload.settings.value ?? "";

                websocket.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    if (data.event == "didReceiveSettings") {
                        parameterSetting = data.payload.settings.parameter ?? "";
                        valueSetting = data.payload.settings.value ?? "";
                    }
                    if (data.event == "sendToPropertyInspector") {
                        // TODO: receive available parameters from the plugin
                    }
                };

                const parameterElement = document.getElementById("parameter");
                parameterElement.value = inActionInfo.payload.settings.parameter ?? "";

                const valueElement = document.getElementById("value");
                valueElement.value = inActionInfo.payload.settings.value ?? "";

                update = () => {
                    websocket.send(
                        JSON.stringify({
                            event: "setSettings",
                            context: inActionInfo.context,
                            payload: {
                                parameter: parameterElement.value || "",
                                value: valueElement.value || "",
                            },
                        }),
                    );
                };
            }

            const connectElgatoStreamDeckSocket = connectOpenActionSocket;
        </script>

        <style>
            * {
                font-family: system-ui, sans-serif;
                font-size: 16px;
                color: oklch(92.2% 0 0);
            }
            body {
                margin: 16px;
                background-color: oklch(26.9% 0 0);
            }
            label {
                margin-right: 4px;
            }
            input {
                margin: 4px;
                padding: 4px;
                background-color: oklch(37.1% 0 0);
                border: 1px solid oklch(43.9% 0 0);
                border-radius: 8px;
            }
        </style>
    </head>

    <body>
        <div>
            <label for="parameter">Parameter:</label>
            <!-- should be a combo box with all parameters -->
            <input id="parameter" oninput="update()" type="text" />
            <br />
            <label for="value">Value:</label>
            <input id="value" oninput="update()" type="text" />
        </div>
    </body>
</html>
