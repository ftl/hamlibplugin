<!doctype html>
<html lang="en">
    <head>
        <script>
            let update = () => {};
            let updateGlobalSettings = () => {};
            let textSetting = "";

            function connectOpenActionSocket(
                inPort,
                inPropertyInspectorUUID,
                inRegisterEvent,
                inInfo,
                inActionInfo,
            ) {
                const websocket = new WebSocket("ws://localhost:" + inPort);
                inActionInfo = JSON.parse(inActionInfo);
                websocket.onopen = () => {
                    websocket.send(
                        JSON.stringify({
                            event: inRegisterEvent,
                            uuid: inPropertyInspectorUUID,
                        }),
                    );
                };
                textSetting = inActionInfo.payload.settings.text ?? 0;
                websocket.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    if (data.event == "didReceiveSettings") {
                        textSetting = data.payload.settings.text ?? 0;
                    }
                };

                const textElement = document.getElementById("text");
                textElement.value = inActionInfo.payload.settings.text ?? "";

                update = () => {
                    websocket.send(
                        JSON.stringify({
                            event: "setSettings",
                            context: inActionInfo.context,
                            payload: {
                                text: textElement.value || "",
                            },
                        }),
                    );
                };
                updateGlobalSettings = () => {
                    websocket.send(
                        JSON.stringify({
                            event: "setGlobalSettings",
                            action: inActionInfo.action,
                            context: inPropertyInspectorUUID,
                            payload: {
                                globalText: textElement.value || "",
                            },
                        }),
                    );
                };
            }

            const connectElgatoStreamDeckSocket = connectOpenActionSocket;
        </script>

        <style>
            * {
                font-family: system-ui, sans-serif;
                font-size: 16px;
                color: oklch(92.2% 0 0);
            }
            body {
                margin: 16px;
                background-color: oklch(26.9% 0 0);
            }
            label {
                margin-right: 4px;
            }
            input {
                margin: 4px;
                padding: 4px;
                background-color: oklch(37.1% 0 0);
                border: 1px solid oklch(43.9% 0 0);
                border-radius: 8px;
            }
        </style>
    </head>

    <body>
        <div>
            <label for="text">Text:</label>
            <input id="text" oninput="update();" type="text" />
            <br />
            <label for="global">Update Global Settings:</label>
            <input
                id="global"
                onclick="updateGlobalSettings();"
                type="button"
                value="Update"
            />
        </div>
    </body>
</html>
